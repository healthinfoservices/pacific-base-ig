# After you have cloned this template,  update the following 5 properties  
id: southpacific.core.fhir.ig                                                                  # a unique identifier for this IG - you will need to update ig.ini with
canonical: https://healthinfoservices.site/southpacific-core-fhir-ig                           # the canonical URL for this IG ideally with a domain you control
name: SouthPacificCoreFHIRIG                                                                   # computer-readable name without spaces
title: South Pacific Core FHIR Implementation Guide                                            # title of the IG
description: FHIR Implementation Guide with Core Definitions for nations in the South Pacific  # this will show as the description of the IG

# update these as required
status: draft # draft | active | retired | unknown
version: 0.0.2
copyrightYear: 2026
releaseLabel: ci-build # ci-build | draft | qa-preview | ballot | trial-use | release | update | normative+trial-use
license: MIT

# this is where you can change the menu structure of the IG
menu:
  Home: index.html
  Artifacts: artifacts.html

# leave these settings as is unless you know what you're doing
fhirVersion: 5.0.0
instanceOptions:
  manualSliceOrdering: true
